<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening Groww...</title>
    <style>
        :root {
            --bg-color: #0f172a;       
            --card-color: #1e293b;     
            --primary-accent: #00d09c; 
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background-color: var(--card-color);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }

        .logo-area {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 20px;
        }

        .logo-dot {
            color: var(--primary-accent);
        }

        h2 {
            font-size: 22px;
            margin-bottom: 10px;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--primary-accent);
            border-radius: 50%;
            margin: 0 auto 30px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn {
            display: inline-block;
            background-color: var(--primary-accent);
            color: #000000;
            font-weight: 600;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 15px;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">Groww<span class="logo-dot">.</span></div>
        <div class="spinner"></div>
        <h2>Opening Groww App</h2>
        <p>Connecting securely. If the app does not load automatically in a few seconds, use the link below.</p>
        <a href="groww://dashboard" id="main-cta" class="btn">Launch App Manually</a>
    </div>

    <script>
        // 1. Define target destinations
        const webUrl = "https://groww.in"; 
        const appScheme = "groww://dashboard";
        const playStoreUrl = "https://google.com";
        const appStoreUrl = "https://apple.com";

        // 2. Identify user platform environment
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        const isAndroid = /android/i.test(userAgent);
        const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;

        // 3. Conditional execution routing engine
        if (!isAndroid && !isIOS) {
            // DESKTOP: Bypass entirely and send immediately to website
            window.location.replace(webUrl);
        } else {
            // MOBILE: Trigger intent system routing
            window.location.href = appScheme;

            // Determine appropriate store fallback if the app isn't installed
            const fallbackStore = isAndroid ? playStoreUrl : appStoreUrl;

            // Fallback mechanism if user remains stuck on the webpage
            setTimeout(function() {
                const ctaButton = document.getElementById('main-cta');
                ctaButton.innerText = "Install Groww App";
                ctaButton.href = fallbackStore;
            }, 2500);
        }
    </script>
</body>
</html>
