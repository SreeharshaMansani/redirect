<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening Groww...</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-color: #1e293b;
            --primary-accent: #00d09c;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background-color: var(--card-color);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
        }
        .logo-area {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 20px;
        }
        .logo-dot { color: var(--primary-accent); }
        h2 { font-size: 22px; margin-bottom: 10px; }
        p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary-accent);
            border-radius: 50%;
            margin: 0 auto 30px auto;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            display: inline-block;
            background-color: var(--primary-accent);
            color: #000;
            font-weight: 600;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 15px;
            width: 100%;
            box-sizing: border-box;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo-area">Groww<span class="logo-dot">.</span></div>
    <div class="spinner"></div>
    <h2>Opening Groww App</h2>
    <p>Connecting securely. If the app does not open, tap below.</p>
    <button class="btn" id="main-cta" onclick="openApp()">Open Groww App</button>
</div>

<script>
    const playStoreUrl = "https://play.google.com/store/apps/details?id=com.nextbillion.groww";
    const appStoreUrl = "https://apps.apple.com/in/app/groww-stocks-mutual-fund-app/id1404380703";
    const webUrl = "https://groww.in";

    const ua = navigator.userAgent || navigator.vendor || window.opera;
    const isAndroid = /android/i.test(ua);
    const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

    function openApp() {
        if (isAndroid) {
            tryAndroidOpen();
        } else if (isIOS) {
            tryIOSOpen();
        } else {
            window.location.href = webUrl;
        }
    }

    function tryAndroidOpen() {
        // Intent URL: if app not installed, Android will auto-redirect to Play Store
        const intentUrl = "intent://dashboard/#Intent;scheme=groww;package=com.nextbillion.groww;S.browser_fallback_url=" + encodeURIComponent(playStoreUrl) + ";end";

        let appOpened = false;

        // If app opens, page becomes hidden
        window.addEventListener("pagehide", () => { appOpened = true; });
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) appOpened = true;
        });

        // Try the intent URL
        window.location.href = intentUrl;

        // After 2.5s, if still here, go to Play Store
        setTimeout(() => {
            if (!appOpened) {
                window.location.href = playStoreUrl;
            }
        }, 2500);
    }

    function tryIOSOpen() {
        let appOpened = false;
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) appOpened = true;
        });

        window.location.href = "groww://dashboard";

        setTimeout(() => {
            if (!appOpened) {
                window.location.href = appStoreUrl;
            }
        }, 2500);
    }

    // Auto-trigger on load
    window.addEventListener("load", () => {
        if (!isAndroid && !isIOS) {
            // Desktop: go straight to website
            window.location.replace(webUrl);
        } else {
            // Mobile: try auto-open after short delay
            setTimeout(openApp, 800);
        }
    });
</script>
</body>
</html>
