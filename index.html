<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening Groww...</title>
    <style>
        :root {
            --bg-color: #0f172a;       
            --card-color: #1e293b;     
            --primary-accent: #00d09c; 
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background-color: var(--card-color);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }

        .logo-area {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 20px;
        }

        .logo-dot {
            color: var(--primary-accent);
        }

        h2 {
            font-size: 22px;
            margin-bottom: 10px;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--primary-accent);
            border-radius: 50%;
            margin: 0 auto 30px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn {
            display: inline-block;
            background-color: var(--primary-accent);
            color: #000000;
            font-weight: 600;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 15px;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">Groww<span class="logo-dot">.</span></div>
        <div class="spinner"></div>
        <h2>Opening Groww App</h2>
        <p>Connecting securely. If the app does not load automatically, tap below.</p>
        <a href="#" id="main-cta" class="btn">Launch App Manually</a>
    </div>

    <script>
        const webUrl = "https://groww.in"; 
        const playStoreUrl = "https://play.google.com/store/apps/details?id=com.nextbillion.groww";
        const appStoreUrl = "https://apple.com";

        // Modern intent string syntax prevents the browser from showing a 404 error page.
        // It tells Android Chrome to look directly for the package ID if the scheme fails.
        const androidIntent = "intent://dashboard/#Intent;scheme=groww;package=com.nextbillion.groww;S.browser_fallback_url=" + encodeURIComponent(playStoreUrl) + ";end;";
        const iosScheme = "groww://dashboard";

        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        const isAndroid = /android/i.test(userAgent);
        const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;

        if (!isAndroid && !isIOS) {
            // 1. DESKTOP: Redirect to browser web panel instantly
            window.location.replace(webUrl);
        } else if (isAndroid) {
            // 2. ANDROID: Apply Android Intent string to bypass 404 rules
            document.getElementById('main-cta').href = androidIntent;
            window.location.href = androidIntent;
        } else if (isIOS) {
            // 3. IOS: Use custom protocol mapping
            document.getElementById('main-cta').href = iosScheme;
            window.location.href = iosScheme;

            // iOS Fallback trigger strategy
            setTimeout(function() {
                // If user is still here after 2.5 seconds, direct to App Store
                window.location.href = appStoreUrl;
            }, 2500);
        }
    </script>
</body>
</html>
